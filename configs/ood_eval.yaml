# ============================================================
# Cognitive Reader — OOD Evaluation Configuration
# ============================================================
# Standalone evaluation config for testing length generalization.
# Use with: python evaluate.py --config configs/ood_eval.yaml
# ============================================================

# ----------------------------------------------------------
# MODEL
# ----------------------------------------------------------
model:
  checkpoint: "./checkpoints/checkpoint_best.pt"
  device: "cuda"                  # cuda | cpu

  # Architecture (must match training config)
  vis_dim: 512
  hidden_dim: 256
  edge_dim: 256
  key_dim: 256
  num_classes: 10
  num_frequencies: 64
  num_heads: 4
  backbone_channels: 512
  detector_hidden_channels: 128

# ----------------------------------------------------------
# GEOMETRY
# ----------------------------------------------------------
geometry:
  threshold_radius_r: 80.0
  noise_sigma: 3.0
  r_infer_multiplier: 1.2         # r_infer = 96.0
  img_width: 640
  img_height: 640
  max_chunk_size: 4
  min_chunk_size: 1

# ----------------------------------------------------------
# EVALUATION
# ----------------------------------------------------------
evaluation:
  # Primary OOD lengths (exceed training max of 50)
  lengths: [50, 100, 200, 500, 1000]

  # Samples per length
  num_samples: 100

  # Controller step budget: max_steps = length * multiplier
  max_steps_multiplier: 3

  # Decoding
  greedy: true                    # true = argmax, false = sampling
  temperature: 1.0                # Sampling temperature (if greedy=false)

  # Detection (can be stricter than training)
  detection_threshold: 0.3
  detection_top_k: 500            # Higher for long sequences

  # Seed for reproducible evaluation
  seed: 9999

# ----------------------------------------------------------
# DATA GENERATION (for synthetic eval data)
# ----------------------------------------------------------
data:
  # No augmentation for evaluation
  rotation_max_deg: 0.0
  blur_probability: 0.0
  brightness_jitter: 0.0
  contrast_jitter: 0.0

  # Normalization (must match training)
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

  # Font
  font_size_base: 28

# ----------------------------------------------------------
# OUTPUT
# ----------------------------------------------------------
output:
  # Results JSON
  results_path: "./eval_results/results.json"

  # Visualizations
  visualize: true
  viz_dir: "./eval_results/viz"
  viz_per_length: 5               # Visualize N samples per length

  # Logs
  log_dir: "./eval_results/logs"

# ----------------------------------------------------------
# METRICS
# ----------------------------------------------------------
metrics:
  # Detection matching
  detection_match_radius: 10.0    # Pixels for center-based matching
  iou_threshold: 0.5              # IoU threshold for box matching

  # Chunk boundary tolerance
  chunk_tolerance: 0              # 0 = exact, 1 = ±1 position

  # Report
  print_per_sample: false         # Print each sample's result
  print_confusion_matrix: true    # Print digit confusion matrix
  print_per_class: true           # Print per-class precision/recall

# ----------------------------------------------------------
# ABLATION CONFIGURATIONS
# ----------------------------------------------------------
# Uncomment to run specific ablation studies:

# ablation_no_chunking:
#   # Force model to never emit <CHUNK> (test pure sequence reading)
#   override_chunk_logit: -100.0

# ablation_no_saccade:
#   # Disable Mode 2 (test local-only traversal)
#   disable_mode2: true

# ablation_fixed_radius:
#   # Test sensitivity to threshold radius
#   radius_sweep: [40, 60, 80, 100, 120]

# ablation_noise_sensitivity:
#   # Test robustness to detector noise
#   noise_sigma_sweep: [0, 1, 3, 5, 10]